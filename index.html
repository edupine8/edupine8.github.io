<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eduardo's Projects</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

        :root {
            --bg: #0a0a0f;
            --bg-panel: #161625;
            --neon-green: #39ff14;
            --neon-blue: #00d4ff;
            --text: #e0e0e0;
            --text-dim: #888;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Scanline overlay ── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(to bottom,
                    transparent 0px,
                    transparent 2px,
                    rgba(0, 0, 0, .08) 2px,
                    rgba(0, 0, 0, .08) 4px);
            pointer-events: none;
            z-index: 999;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
            margin-top: 2rem;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            color: var(--neon-blue);
            text-shadow: 0 0 10px #00d4ffaa;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        h1 span {
            color: var(--text);
            text-shadow: none;
        }

        .subtitle {
            font-size: 1rem;
            letter-spacing: 0.2em;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1000px;
            justify-content: center;
        }

        @media (max-height: 800px) and (orientation: landscape) {
            .grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 300px));
            }

            header {
                margin-bottom: 2rem;
                margin-top: 1rem;
            }

            h1 {
                font-size: 2.2rem;
            }
        }

        .card {
            background: var(--bg-panel);
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--text);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-green);
            box-shadow: 0 0 20px #39ff1444;
        }

        .card-img-wrap {
            width: 100%;
            aspect-ratio: 3 / 4;
            overflow: hidden;
            border-bottom: 1px solid #333;
            position: relative;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover img {
            transform: scale(1.05);
        }

        .card-content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .card h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-green);
            font-size: 1.4rem;
            margin-bottom: 0.2rem;
        }

        .card p {
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.4;
        }

        .tags {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border: 1px solid var(--text-dim);
            border-radius: 4px;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        .card:hover .tag {
            border-color: var(--neon-green);
            color: var(--neon-green);
        }

        .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(10, 10, 15, 0.8);
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            font-family: 'Orbitron', sans-serif;
            padding: 0.8rem 1.5rem;
            font-size: 1.2rem;
            letter-spacing: 0.1em;
            opacity: 0;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .card:hover .play-btn {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            box-shadow: 0 0 15px #39ff1488;
        }
    </style>
</head>

<body>

    <header>
        <h1>EDUARDO'S <span>PORTFOLIO</span></h1>
        <p class="subtitle">A collection of web experiments & games</p>
    </header>

    <main class="grid">

        <!-- Snake Game Card -->
        <a href="https://edupine8.github.io/snake-game2/" class="card">
            <div class="card-img-wrap">
                <img src="assets/snake_cover.png" alt="Snake Game Cover Art">
                <div class="play-btn">PLAY NOW</div>
            </div>
            <div class="card-content">
                <h2>Cyber Snake</h2>
                <p>A modern, neon-infused reimagining of the classic arcade game. Featuring dynamic speeds, local
                    2-player support, mobile swipe controls, and reactive synthwave audio.</p>
                <div class="tags">
                    <span class="tag">HTML5 Canvas</span>
                    <span class="tag">Vanilla JS</span>
                    <span class="tag">Mobile Ready</span>
                </div>
            </div>
        </a>

        <!-- Placeholder for future games -->
        <!--
        <a href="#" class="card" style="opacity: 0.5; pointer-events: none;">
            <div class="card-img-wrap" style="background: #111; display:flex; align-items:center; justify-content:center;">
                <span style="color:#444; font-size: 3rem;">?</span>
            </div>
            <div class="card-content">
                <h2 style="color: #666;">Coming Soon</h2>
                <p>More projects and experiments are currently in development...</p>
            </div>
        </a>
        -->

    </main>

</body>

</html>
